<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>All Chats Sidebar for Grok</title>
    <link rel="stylesheet" href="popup.css">
    <script src="i18n.js" defer></script>
    <script src="popup.js" defer></script>
  </head>
  <body>
    <main>
      <h1 id="title">All Chats Sidebar for Grok</h1>
      <div class="field">
        <label id="language-label" for="language">Interface language</label>
        <select id="language"></select>
      </div>
      <div id="status" role="status" aria-live="polite"></div>
      <p id="privacy-notice">
        Unofficial extension. Grok chat titles and metadata are processed only in your browser and are never sent to the developer.
      </p>
      <a
        id="source-link"
        href="https://github.com/communism420/All-Chats-Sidebar-for-Grok"
        target="_blank"
        rel="noopener noreferrer"
      >Open-source code (MIT)</a>
    </main>
  </body>
</html>
