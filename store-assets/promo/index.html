<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>All Chats Sidebar promotional image</title>
    <link rel="stylesheet" href="promo.css">
  </head>
  <body>
    <main class="promo-canvas">
      <div class="background-frame frame-one" aria-hidden="true"></div>
      <div class="background-frame frame-two" aria-hidden="true"></div>
      <div class="accent-rail rail-cyan" aria-hidden="true"></div>
      <div class="accent-rail rail-coral" aria-hidden="true"></div>

      <section class="brand-visual" aria-label="All Chats Sidebar for Grok logo">
        <div class="logo-crop">
          <img class="brand-logo" src="../../logo.png" alt="All Chats Sidebar for Grok">
        </div>
      </section>

      <section class="sidebar-visual" aria-label="A unified, resizable chat sidebar illustration">
        <div class="panel-copy copy-back" aria-hidden="true"></div>
        <div class="panel-copy copy-middle" aria-hidden="true"></div>

        <div class="sidebar-panel">
          <header class="panel-header" aria-hidden="true">
            <span class="grid-mark">
              <i></i><i></i><i></i><i></i>
            </span>
            <span class="header-line"></span>
            <span class="header-control"></span>
          </header>

          <div class="section-marker marker-pinned" aria-hidden="true">
            <span></span><i></i>
          </div>

          <div class="chat-list" aria-hidden="true">
            <div class="chat-row selected">
              <span class="chat-bubble"></span>
              <span class="chat-copy"><i></i><i></i></span>
              <span class="menu-dots"><i></i><i></i><i></i></span>
            </div>
            <div class="chat-row">
              <span class="chat-bubble"></span>
              <span class="chat-copy medium"><i></i><i></i></span>
            </div>
            <div class="chat-row">
              <span class="chat-bubble"></span>
              <span class="chat-copy long"><i></i><i></i></span>
            </div>

            <div class="section-marker marker-history">
              <span></span><i></i>
            </div>

            <div class="chat-row history-row">
              <span class="chat-bubble"></span>
              <span class="chat-copy medium"><i></i><i></i></span>
            </div>
            <div class="chat-row history-row">
              <span class="chat-bubble"></span>
              <span class="chat-copy long"><i></i><i></i></span>
            </div>
            <div class="chat-row history-row optional-row">
              <span class="chat-bubble"></span>
              <span class="chat-copy short"><i></i><i></i></span>
            </div>
            <div class="chat-row history-row optional-row">
              <span class="chat-bubble"></span>
              <span class="chat-copy medium"><i></i><i></i></span>
            </div>
          </div>

          <div class="resize-edge" aria-hidden="true"><span></span></div>
        </div>
      </section>
    </main>
  </body>
</html>
